name: Run compass-runtime-agent integration tests on k3d
on:
  workflow_call:
    inputs:
      k3d-version:
        required: true
        type: string
        default: v5.8.3
      cra-image:
        required: false
        type: string
      artifact-prefix:
        required: false
        type: string
        default: ""
    secrets:
      compass-host:
        required: true
      compass-client-id:
        required: true
      compass-client-secret:
        required: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-helm@v4.3.0
        id: install-helm
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Set up go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: install-k3d
        env:
          K3D_URL: https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh
          DEFAULT_K3D_VERSION: ${{ inputs.k3d-version }}
        run: curl --silent --fail $K3D_URL | TAG=$DEFAULT_K3D_VERSION bash
      - name: change CRA image
        if: ${{ inputs.cra-image != '' }}
        uses: mikefarah/yq@5a7e72a743649b1b3a47d1a1d8214f3453173c51  # v4.52.4
        with:
          cmd: yq -i 'select(.kind == "Deployment" and .metadata.name == "compass-runtime-agent").spec.template.spec.containers[0].image = "${{ inputs.cra-image }}"' application-connector.yaml
      - name: run-tests
        env:
          COMPASS_CLIENT_ID: ${{ secrets.compass-client-id }}
          COMPASS_CLIENT_SECRET: ${{ secrets.compass-client-secret }}
          COMPASS_HOST: ${{ secrets.compass-host }}
        run: |
          make -C tests/hack/ci k3d-agent-tests
          mv ./compass-runtime-agent-test.txt ./components/compass-runtime-agent/test-integration.txt
          mv ./compass-runtime-agent.txt ./components/compass-runtime-agent/test-integration-logs.txt
      - name: archive-test-logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{inputs.artifact-prefix}}compass-runtime-agent-test-integration
          path: ./components/
      - name: test summary
        if: success() || failure()
        run: |
          {
            echo "# K3D Agent Test Summary:"
            echo "<details>"
            echo "<summary>Click to expand test logs</summary>"
            printf '\n```\n'
            if [ -f ./components/compass-runtime-agent/test-integration.txt ]; then
              cat ./components/compass-runtime-agent/test-integration.txt
            else
              echo "Test output file not found. Test may have failed before producing output."
            fi
            printf '\n```\n'
            echo "</details>"
            echo "<details>"
            echo "<summary>Click to expand CRA logs</summary>"
            printf '\n```\n'
            if [ -f ./components/compass-runtime-agent/test-integration-logs.txt ]; then
              cat ./components/compass-runtime-agent/test-integration-logs.txt
            else
              echo "CRA logs file not found."
            fi
            printf '\n```\n'
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY
