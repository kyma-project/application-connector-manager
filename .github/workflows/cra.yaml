name: CRA

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cra.yaml"
      - ".github/workflows/cra-tests.yaml"
      - "components/compass-runtime-agent/**"
      - "!components/compass-runtime-agent/**.md"
      - "!components/compass-runtime-agent/hack/boilerplate.go.txt"
      - "tests/**"
      - "!tests/**.md"
      - "!tests/Dockerfile.*"
      - "tests/Dockerfile.compass-runtime-agent"
      - "hack/common/**"
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/cra.yaml"
      - ".github/workflows/cra-tests.yaml"
      - "components/compass-runtime-agent/**"
      - "!components/compass-runtime-agent/**.md"
      - "!components/compass-runtime-agent/hack/boilerplate.go.txt"
      - "tests/**"
      - "!tests/**.md"
      - "!tests/Dockerfile.*"
      - "tests/Dockerfile.compass-runtime-agent"
      - "hack/common/**"

permissions:
  id-token: write # This is required for requesting the JWT token
  contents: read # This is required for actions/checkout
  pull-requests: read # This is required for setup job in cra-tests.yaml

jobs:
  gate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name != github.repository
    environment: ${{ vars.PROTECTED_ENVIRONMENT }}
    steps:
      - name: Approve fork PR image build
        run: echo "Image build approved for fork PR"
  
  setup-and-test:
    needs: [gate]
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    uses: ./.github/workflows/cra-tests.yaml
    secrets:
      COMPASS_HOST: ${{ secrets.COMPASS_HOST }}
      COMPASS_CLIENT_ID: ${{ secrets.COMPASS_CLIENT_ID }}
      COMPASS_CLIENT_SECRET: ${{ secrets.COMPASS_CLIENT_SECRET }}

  tags:
    needs: [gate]
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.latest.outputs.latest || '' }}
    steps:
      - id: latest
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name == 'push'
        run: echo "latest=latest" >> $GITHUB_OUTPUT

  build-test-image:
    needs: [setup-and-test, gate]
    if: >-
      needs.setup-and-test.outputs.test == 'true' &&
      (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: compass-runtime-agent-test
      dockerfile: Dockerfile.compass-runtime-agent
      context: tests

  build-image:
    needs: [setup-and-test, tags, gate]
    if: >-
      needs.setup-and-test.outputs.cra == 'true' &&
      (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: compass-runtime-agent
      dockerfile: Dockerfile
      context: components/compass-runtime-agent
      tags: |
        ${{ needs.tags.outputs.latest }}

  k3d-PR-integration:
    # we're using reusable because we can't modify workflows as contributors
    # it could cause the secret leakeages
    uses: "./.github/workflows/reusable-k3d-agent-test.yaml"
    needs: [build-image]
    if: needs.build-image.result == 'success'
    with:
      k3d-version: v5.8.3
      cra-image: ${{ fromJSON(needs.build-image.outputs.images)[0] }}
      artifact-prefix: "pr-"
    secrets:
      compass-host: ${{ secrets.COMPASS_HOST }}
      compass-client-id: ${{ secrets.COMPASS_CLIENT_ID }}
      compass-client-secret: ${{ secrets.COMPASS_CLIENT_SECRET }}

  print-images:
    runs-on: ubuntu-latest

    # if any of the build jobs succeeded - run this job
    needs: [build-image, build-test-image]
    if: always() && contains(needs.*.result, 'success')

    steps:
      - name: "Generate summary"
        run: |
          {
            echo '## CRA Images'
            printf '\n```json\n'
            if [ "${{ needs.build-image.result }}" == "success" ]; then
              echo '${{ needs.build-image.outputs.images }}' | jq
            fi

            if [ "${{ needs.build-test-image.result }}" == "success" ]; then
              echo '${{ needs.build-test-image.outputs.images }}' | jq
            fi

            printf '\n```\n'
          } >> $GITHUB_STEP_SUMMARY
