name: ACM

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - .github/workflows/controller.yaml
      - .github/workflows/controller-tests.yaml
      - main.go
      - api/**
      - pkg/**
      - controllers/**
      - application-connector.yaml
      - application-connector-dependencies.yaml
      - application-connector-optional.yaml
      - go.sum
      - go.mod
      - Dockerfile

  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/controller.yaml
      - .github/workflows/controller-tests.yaml
      - main.go
      - api/**
      - pkg/**
      - controllers/**
      - application-connector.yaml
      - application-connector-dependencies.yaml
      - application-connector-optional.yaml
      - go.sum
      - go.mod
      - Dockerfile

permissions:
  id-token: write # This is required for requesting the JWT token
  contents: read # This is required for actions/checkout

jobs:
  gate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name != github.repository
    environment: ${{ vars.PROTECTED_ENVIRONMENT }}
    steps:
      - name: Approve fork PR image build
        run: echo "Image build approved for fork PR"

  setup-and-tests:
    needs: [gate]
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    uses: ./.github/workflows/controller-tests.yaml

  build-image:
    needs: [setup-and-tests, gate]
    if: >-
      needs.setup-and-tests.result == 'success' &&
      (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main # Usage: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: application-connector-manager
      dockerfile: Dockerfile
      context: .
      tags: |
        ${{ needs.setup-and-tests.outputs.latest }}

  print-images:
    runs-on: ubuntu-latest
    needs: [build-image]
    if: always() && contains(needs.*.result, 'success')
    steps:
      - name: "Generate summary"
        run: |
          {
            echo '## ACM Images'
            printf '\n```json\n'
            echo '${{ needs.build-image.outputs.images }}' | jq
            printf '\n```\n'
          } >> $GITHUB_STEP_SUMMARY
