name: Module integration tests

on:
  workflow_call:
  push:
    branches: [ "main" ]

  pull_request:

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up go environment
      uses: actions/setup-go@v6
      with:
          go-version-file: 'go.mod'

    - name: Run integration tests without lifecycle-manager
      run: |
        set -o pipefail
        make -C hack/ci run-without-lifecycle-manager 2>&1 | tee module-integration-test.txt

    - name: Archive test results
      if: success() || failure()
      uses: actions/upload-artifact@v7
      with:
        name: module-integration-test
        path: module-integration-test.txt

    - name: Integration test summary
      if: success() || failure()
      run: |
        {
          echo '## Module Integration Tests'
          echo "<details>"
          echo "<summary>click to expand logs</summary>"
          printf '\n```\n'
          if [ -f module-integration-test.txt ]; then
            cat module-integration-test.txt
          else
            echo "Test output file not found. Test may have failed before producing output."
          fi
          printf '\n```\n'
          echo "</details>"
        } >> $GITHUB_STEP_SUMMARY
